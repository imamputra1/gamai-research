pipeline:
  n_target: 100
  m_datasets: 20
  random_seed: 42
  report_master_index: 1
  confidence_level: 0.95
  margin_of_error: 0.05
  population_proportion: 0.5

likert:
  min: 1
  max: 5

tolerance:
  corr: 0.10

paths:
  raw_seed: "data/01_raw_seed"
  processed: "data/02_processed"
  synthetic: "data/03_synthetic"
  report_master: "data/04_report_master"
  logs: "logs"
  reports_figures: "reports/figures"
  reports_tables: "reports/tables"

ai:
  kimi_model: "kimi-k2-5"
  kimi_base_url: "https://api.moonshot.cn/v1"
  openclaw_model: "claude-sonnet-4-20250514"
  max_token: 4096
  temperature: 0.3

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  datefmt: "%Y-%m-%d %H-%M-%S"

reproducibility:
  block_d:
    signifikansi_alpha: 0.05
    jumlah_bootstrap: 5000
    kunci_random_seed: 42
    arsitektur_model:
      independen: ["People", "Process", "Physical_Evidence"]
      mediator: ["Experience_Value"]
      dependen: ["Minat_Kunjungan"]
    Paths:
      output_tables: "reports/analisis/tables"
      output_figures: "reports/analisis/figures"

